name: Apex Scenario Gate
on:
  pull_request:
    branches: [ main ]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Testes (eval como teste)
        run: pytest tests/ -v
      - name: Slice vertical de cada cenario
        run: |
          for s in scenarios/*.yaml; do
            python generators/code_generator.py "$s" job.py
            python generators/plan_generator.py "$s" log.ndjson
            python watchers/skew_watcher.py "$s" log.ndjson
          done
