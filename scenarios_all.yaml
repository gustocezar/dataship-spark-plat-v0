---
# Cenário 1: null_skew
scenario_id: null_skew
version: 1
owner: pod-a1
status: draft
anti_pattern:
  class: data_skew_on_null_key
  severity: high
code_generator:
  language: pyspark
  emits: job.py
  anti_pattern_line: 42
  data:
    left:
      rows: 500000
      distinct_keys: 1000
      null_fraction: 0.4
    right:
      rows: 100000
      distinct_keys: 1000
      null_fraction: 0.0
  spark_config:
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.skewJoin.enabled: "false"
    spark.sql.shuffle.partitions: "8"
plan_generator:
  emits: event-log.ndjson
  strategy: synthesize
  expected_signals:
    join_operator: SortMergeJoin
    hot_partition:
      stage: 3
      single_task_shuffle_read_records: 200000
oracle:
  enabled: true
  cadence: weekly
  on_divergence: fail_and_open_issue
acceptance:
  root_cause_includes: ["null skew", "null key", "SortMergeJoin"]
